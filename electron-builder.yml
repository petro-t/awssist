appId: com.awssist.app
productName: AWSsist
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"

# ---------- macOS ----------
# Signed + notarized using a Developer ID Application certificate.
# Required environment variables at build time:
#   CSC_LINK                       — path (or base64) to the .p12 certificate
#   CSC_KEY_PASSWORD               — password used when the .p12 was exported
#   APPLE_ID                       — Apple ID enrolled in the Developer Program
#   APPLE_APP_SPECIFIC_PASSWORD    — 16-char app-specific password from appleid.apple.com
#   APPLE_TEAM_ID                  — 10-char Team ID from developer.apple.com
#
# To do an unsigned local build (e.g. for quick UI testing), set CSC_IDENTITY_AUTO_DISCOVERY=false.
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - target: dmg
      arch: arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize:
    teamId: "${env.APPLE_TEAM_ID}"
dmg:
  artifactName: ${productName}-${version}-${arch}.dmg

# ---------- Windows ----------
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64, arm64]
    - target: portable
      arch: x64
  # No code-signing — Windows SmartScreen will warn the first time and the
  # user has to click "More info → Run anyway". Acceptable for internal use.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
  shortcutName: AWSsist
  uninstallDisplayName: AWSsist
portable:
  artifactName: ${productName}-${version}-portable-${arch}.${ext}

# ---------- Linux ----------
# Note on .deb: cross-compiling .deb from macOS is unreliable (the bundled fpm
# is from 2015 and produces invalid archives on modern macOS). AppImage works
# on every major distro and is the recommended format for cross-compiled builds.
# If you need .deb specifically, build on a Linux host: `npm run dist:linux:full`.
linux:
  category: Development
  icon: build/icon.png
  target:
    - target: AppImage
      arch: [x64, arm64]
  synopsis: Desktop AWS account & session manager
  description: |
    AWSsist is a profile manager for AWS — sign in via SSO once, then browse
    ECS / EC2 / RDS / Redis resources across accounts. One-click SSM
    port-forwarding tunnels and SSM/ECS shell sessions in your terminal.
  desktop:
    entry:
      Name: AWSsist
      Comment: AWS Profile Management Assistant
      Categories: Development;Utility;
      StartupWMClass: AWSsist
appImage:
  artifactName: ${productName}-${version}-${arch}.${ext}
deb:
  artifactName: ${productName}_${version}_${arch}.${ext}
  # Runtime dependencies a user's system needs for SSM/SSO features.
  # awscli and session-manager-plugin live outside apt repos on most distros,
  # so we mention them in the description rather than declaring as Depends.
